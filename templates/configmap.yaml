apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: {{ .Values.namespace }}
data:
  APP_NAME: {{ .Values.app.name | quote }}
  APP_ENV: {{ .Values.app.env | quote }}
  APP_DEBUG: {{ .Values.app.debug | quote }}
  APP_URL: {{ .Values.app.url | quote }}
  APP_LOCALE: {{ .Values.app.locale | quote }}
  APP_FALLBACK_LOCALE: {{ .Values.app.fallbackLocale | quote }}

  LOG_CHANNEL: {{ .Values.app.logChannel | quote }}
  LOG_LEVEL: {{ .Values.app.logLevel | quote }}

  DB_CONNECTION: "pgsql"
  DB_HOST: "pgsql"
  DB_PORT: "5432"
  DB_DATABASE: {{ .Values.secrets.dbDatabase | quote }}
  DB_USERNAME: {{ .Values.secrets.dbUsername | quote }}

  SESSION_DRIVER: {{ .Values.app.sessionDriver | quote }}
  SESSION_LIFETIME: {{ .Values.app.sessionLifetime | quote }}
  CACHE_STORE: {{ .Values.app.cacheStore | quote }}
  QUEUE_CONNECTION: {{ .Values.app.queueConnection | quote }}

  FILESYSTEM_DISK: {{ .Values.app.filesystemDisk | quote }}
  MAIL_MAILER: {{ .Values.app.mailMailer | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: {{ .Values.namespace }}
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /var/www/html/public;

        index index.php;
        charset utf-8;

        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        error_page 404 /index.php;

        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
        }

        location ~ /\.(?!well-known).* {
            deny all;
        }

        client_max_body_size 50M;
    }
