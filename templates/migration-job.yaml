{{- if .Values.migration.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: laravel-migrate-{{ .Release.Revision }}
  namespace: {{ .Values.namespace }}
  annotations:
    # 如果用 ArgoCD 管理这个 chart，这两行让它在每次 Sync 前自动跑一次 migration
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["php", "artisan", "migrate", "--force"]
          envFrom:
            - configMapRef:
                name: app-config
            - secretRef:
                name: app-secret
{{- end }}
